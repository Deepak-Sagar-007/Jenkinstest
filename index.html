<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>Welcome to My Website</h1>

    <!-- Paragraph of text -->
    <p>This is a basic paragraph showing how HTML structures text content.</p>

    <!-- Hyperlink -->
    <p>Visit the official <a href="https://www.w3schools.com" target="_blank">W3Schools website</a> to learn more.</p>

    <!-- Unordered List -->
    <h3>My Favorite Fruits</h3>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>

</body>
</html>
